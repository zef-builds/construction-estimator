<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Construction Cost Estimator — 2025 Altus Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c18;--surface:#0e1324;--surface-h:#141c30;--border:#1e2538;--border-a:rgba(79,209,197,0.3);
  --text:#e0e3eb;--text-dim:#6b7080;--text-faint:#3a4058;
  --accent:#4fd1c5;--accent-dim:rgba(79,209,197,0.12);--accent-glow:rgba(79,209,197,0.25);
  --orange:#f6ad55;--blue:#2b6cb0;--red:#fc8181;--green:#68d391;--purple:#b794f4;
  --mono:'JetBrains Mono','SF Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:rgba(79,209,197,0.25)}
input::placeholder{color:var(--text-faint)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:22px;width:22px;border-radius:50%;background:var(--accent);margin-top:-8px;box-shadow:0 0 12px var(--accent-glow)}
input[type=range]::-moz-range-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px}
input[type=range]::-moz-range-thumb{height:22px;width:22px;border-radius:50%;background:var(--accent);border:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}.slide-up{animation:slideUp .4s ease}
.hidden{display:none}
.shell{max-width:520px;margin:0 auto;padding:16px 16px 80px}
.logo{text-align:center;padding:28px 0 8px}
.logo h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.logo p{font-size:11px;color:var(--text-dim);margin-top:4px}
/* City pills */
.city-bar{display:flex;gap:6px;overflow-x:auto;padding:12px 0;scrollbar-width:none;-ms-overflow-style:none}
.city-bar::-webkit-scrollbar{display:none}
.city-pill{flex-shrink:0;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.city-pill.active{border-color:var(--border-a);background:var(--accent-dim);color:var(--accent)}
/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:10px;padding:3px;margin:12px 0}
.tab-btn{flex:1;padding:9px 6px;border:none;border-radius:8px;background:transparent;color:var(--text-dim);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--sans);white-space:nowrap}
.tab-btn.active{background:#141c30;color:var(--text)}
/* Search */
.search-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--border-a)}
/* Type cards */
.type-card{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px;cursor:pointer;transition:all .2s}
.type-card:hover{border-color:#2a3348;background:var(--surface-h)}
.type-card.selected{border-color:var(--border-a);background:var(--accent-dim)}
.type-name{font-weight:600;font-size:13px}.type-sector{font-size:11px;color:var(--text-dim);margin-top:2px}
.type-range{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:6px}
.sector-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;margin-right:4px}
.tag-private{background:#1a1f35;color:#8a8fa0}.tag-public{background:#1a2535;color:#6b9fb0}.tag-infra{background:#251a1a;color:#b08a6b}
/* Estimate panel */
.est-section{margin-bottom:20px}
.est-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-weight:600}
.num-input{width:100%;padding:10px 0;border:none;border-bottom:2px solid #1e2538;background:transparent;color:#fff;font-size:26px;font-family:var(--mono);font-weight:600;outline:none;transition:border-color .2s;-webkit-appearance:none}
.num-input:focus{border-color:var(--accent)}
.slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-val{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:600}
.pill-group{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;background:var(--surface);color:var(--text-dim);transition:all .2s}
.pill.active{border-color:var(--border-a);background:var(--accent-dim);color:var(--accent)}
.gen-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#080c18;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .2s;letter-spacing:-0.3px}
.gen-btn:hover{box-shadow:0 0 30px var(--accent-glow)}
.change-btn{margin-top:16px;padding:7px 16px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .2s}
.change-btn:hover{border-color:#3a4560;color:#c0c4d0}
/* Results */
.result-card{border-radius:14px;border:1px solid var(--border);background:var(--surface);overflow:hidden;animation:slideUp .4s ease}
.result-header{padding:20px;border-bottom:1px solid #141c30}
.result-total{font-size:36px;font-family:var(--mono);font-weight:700;color:var(--accent);letter-spacing:-1px}
.result-body{padding:16px 20px}
.result-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0}
.result-row .lbl{font-size:13px;font-weight:500}.result-row .sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.result-row .val{font-family:var(--mono);font-size:14px;font-weight:600;text-align:right}
.val-dim{color:var(--text-dim)!important}
.result-divider{height:1px;background:#141c30;margin:4px 0}
.result-footer{padding:14px 20px;border-top:1px solid #141c30;font-size:11px;color:var(--text-dim);line-height:1.6}
/* Comparison bars */
.comp-section{margin-top:24px}.comp-title{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:12px}
.comp-row{display:grid;grid-template-columns:80px 1fr 70px;align-items:center;gap:8px;margin-bottom:6px}
.comp-city{font-size:11px;color:var(--text-dim)}.comp-track{height:20px;background:#0a0f1c;border-radius:4px;overflow:hidden}
.comp-bar{height:100%;border-radius:4px;transition:width .6s ease;min-width:2px}
.comp-val{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:right}
/* LCCA */
.lcca-select{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;-webkit-appearance:none;width:100%;cursor:pointer}
.lcca-metric{padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035}
.lcca-metric .m-label{font-size:11px;color:var(--text-faint)}
.lcca-metric .m-val{font-size:22px;font-family:var(--mono);font-weight:600;margin-top:2px}
.lcca-metric .m-sub{font-size:11px;color:var(--text-faint)}
.bar-chart{display:flex;flex-direction:column;gap:4px;margin-top:12px}
.bar-row-lc{display:grid;grid-template-columns:60px 1fr 80px;align-items:center;gap:8px}
.bar-track-lc{height:20px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%;transition:width .5s ease}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.lcca-pill{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;background:var(--surface);color:var(--text-dim);transition:all .2s}
.lcca-pill.active{border-color:var(--border-a);background:var(--accent-dim);color:var(--accent)}
/* Optimization */
.opt-card{border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:16px;margin-bottom:12px;transition:all .2s}
.opt-card:hover{border-color:#2a3348}
.opt-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.opt-card p{font-size:12px;color:var(--text-dim);line-height:1.5}
.opt-card .opt-icon{font-size:20px;margin-bottom:8px}
.opt-result{border-radius:12px;border:1px solid var(--border);background:var(--surface);padding:20px;margin-top:16px;animation:slideUp .4s ease}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.opt-metric{padding:10px;background:#0a0f1c;border-radius:8px;border:1px solid #1a2035}
.opt-metric .om-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.3px}
.opt-metric .om-val{font-size:18px;font-family:var(--mono);font-weight:600;margin-top:2px}
.opt-metric .om-sub{font-size:10px;color:var(--text-dim);margin-top:1px}
.scenario-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #141c30}
.scenario-row:last-child{border-bottom:none}
.scenario-label{font-size:13px;font-weight:500}
.scenario-val{font-family:var(--mono);font-size:13px;font-weight:600}
.savings-tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:5px;font-family:var(--mono);font-weight:600}
.tag-save{background:rgba(104,211,145,0.12);color:var(--green)}
.tag-cost{background:rgba(252,129,129,0.12);color:var(--red)}
.tag-neutral{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.opt-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:14px;outline:none;transition:border-color .2s}
.opt-input:focus{border-color:var(--border-a)}
/* Shared utility */
.link-btn{display:block;width:100%;padding:14px;border-radius:12px;border:1px solid rgba(79,209,197,0.2);background:rgba(79,209,197,0.04);color:var(--accent);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;margin-top:16px;transition:all .2s;text-align:center}
.link-btn:hover{background:rgba(79,209,197,0.08)}
.link-btn-orange{border-color:rgba(246,173,85,0.3);background:rgba(246,173,85,0.06);color:var(--orange)}
.link-btn-orange:hover{background:rgba(246,173,85,0.1)}
</style>
</head>

const fmt = n => "$" + Math.round(n).toLocaleString();
const fmtM = n => n >= 1e6 ? "$" + (n/1e6).toFixed(1) + "M" : fmt(n);
function lerp(low, high, t) { return Math.round(low + (high - low) * (t / 100)); }
function getUnit(type) {
  if (type.perStall) return "/stall";
  if (type.perLM) return "/lin.m";
  if (type.perSM) return "/sq.m";
  return "/sf";
}
function getRate(type, city, q) {
  const r = type.rates[city];
  return lerp(r[0], r[1], q);
}

// ── Helpers for live project input updates ──
function piUpdate(field, val) {
  projectInputs[field] = val;
  // Keep derived fields in sync
  if (field === 'gfa' || field === 'storeys') {
    if (projectInputs.storeys > 0) {
      projectInputs.floorplate = Math.round(projectInputs.gfa / projectInputs.storeys);
    }
    document.getElementById('pi-floorplate') && (document.getElementById('pi-floorplate').textContent = projectInputs.floorplate.toLocaleString() + ' sf');
  }
  if (field === 'gfa' || field === 'siteArea') {
    projectInputs.fsr = projectInputs.siteArea > 0 ? +(projectInputs.gfa / projectInputs.siteArea).toFixed(2) : 0;
    document.getElementById('pi-fsr') && (document.getElementById('pi-fsr').textContent = projectInputs.fsr > 0 ? 'FSR: ' + projectInputs.fsr.toFixed(2) : '');
  }
  if (field === 'quality') {
    const t = selectedType;
    if (t) {
      const r = t.rates[currentCity];
      const unit = getUnit(t);
      document.getElementById('pi-q-val') && (document.getElementById('pi-q-val').textContent = projectInputs.quality + '%');
      document.getElementById('pi-q-base') && (document.getElementById('pi-q-base').textContent = 'Base ($' + r[0].toLocaleString() + unit + ')');
      document.getElementById('pi-q-prem') && (document.getElementById('pi-q-prem').textContent = 'Premium ($' + r[1].toLocaleString() + unit + ')');
    }
  }
  if (field === 'softPct') {
    document.getElementById('pi-soft-val') && (document.getElementById('pi-soft-val').textContent = projectInputs.softPct + '%');
  }
  if (['bachelor','one','two','three'].includes(field)) {
    projectInputs.unitMix[field] = val;
    const total = Object.values(projectInputs.unitMix).reduce((a,b)=>a+b,0);
    projectInputs.unitCount = total;
    document.getElementById('pi-unit-total') && (document.getElementById('pi-unit-total').textContent = 'Total: ' + total.toLocaleString() + ' units');
  }
}

  const rate = lerp(r[0], r[1], pi.quality);
  const isBuilding = !t.perStall && !t.perLM && !t.perSM;
  const area = isBuilding ? pi.gfa : (t.perStall ? pi.parkingStalls : pi.gfa);
  const unit = getUnit(t);
  const baseCost = rate * area;

  let parkCost = 0;
  let parkRow = "";
  if (isBuilding && pi.parkingType !== "none") {
    const pKey = pi.parkingType === "surface" ? "surface_lot" : pi.parkingType === "above" ? "parkade_ag" : "parkade_ug";
    const pType = TYPES.find(x => x.id === pKey);
    const pRate = lerp(pType.rates[currentCity][0], pType.rates[currentCity][1], pi.quality);
    const stalls = pi.parkingStalls || 100;
    parkCost = pRate * stalls;
    parkRow = `<div class="result-row"><div><div class="lbl">Parking (${pi.parkingType === "surface" ? "Surface" : pi.parkingType === "above" ? "Above Grade" : "Underground"})</div><div class="sub">${stalls} stalls × $${pRate.toLocaleString()}/stall</div></div><div class="val">${fmt(parkCost)}</div></div>`;
  }

  const hardTotal = baseCost + parkCost;
  const softPct = isBuilding ? pi.softPct : 15;
  const softCost = hardTotal * softPct / 100;
  const grandTotal = hardTotal + softCost;

  // Per-unit row (residential only)
  const unitCount = pi.unitMix ? Object.values(pi.unitMix).reduce((a,b)=>a+b,0) : 0;
  let perUnitRow = "";
  if (isBuilding && t.cat === "residential" && unitCount > 0) {
    const costPerUnit = grandTotal / unitCount;
    perUnitRow = `<div class="result-divider"></div>
      <div class="result-row"><div><div class="lbl">Per Unit Cost</div><div class="sub">${unitCount} units total</div></div><div class="val" style="color:var(--accent)">${fmt(costPerUnit)}<span style="font-size:10px;font-weight:400;color:var(--text-dim)"> / unit</span></div></div>`;
  }

  // FSR row
  let fsrRow = "";
  if (isBuilding && pi.siteArea > 0) {
    const fsr = (pi.gfa / pi.siteArea).toFixed(2);
    fsrRow = `<div class="result-divider"></div>
      <div class="result-row"><div><div class="lbl">FSR</div><div class="sub">Verify against zoning approval</div></div><div class="val" style="color:var(--orange)">${fsr}</div></div>`;
  }

  // Store for LCCA / Optimization — includes all new Session 1 fields
  lastEstimate = {
    type: t, city: currentCity, area, rate, baseCost, parkCost,
    parkingType: pi.parkingType, parkingStalls: pi.parkingStalls,
    hardTotal, softCost, softPct, grandTotal, quality: pi.quality,
    storeys: pi.storeys, floorplate: pi.floorplate,
    unitCount, unitMix: {...pi.unitMix},
    siteArea: pi.siteArea, fsr: pi.siteArea > 0 ? +(pi.gfa / pi.siteArea).toFixed(2) : 0
  };

  // Cross-market comparison bars
  let compHTML = "";
  if (isBuilding) {
    const allRates = CITIES.map(c => ({label: c.label, rate: lerp(t.rates[c.id][0], t.rates[c.id][1], pi.quality)}));
    const maxRate = Math.max(...allRates.map(x => x.rate));
    compHTML = `<div class="comp-section"><div class="comp-title">Cross-Market Comparison at ${pi.quality}% Quality</div>
      ${allRates.map(c => {
        const w = (c.rate / maxRate * 100).toFixed(0);
        const isCurrent = c.label === CITIES.find(x => x.id === currentCity).label;
        const color = isCurrent ? "var(--accent)" : "#1e2538";
        return `<div class="comp-row"><div class="comp-city">${c.label}</div><div class="comp-track"><div class="comp-bar" style="width:${w}%;background:${color}"></div></div><div class="comp-val">$${c.rate}</div></div>`;
      }).join("")}
    </div>`;
  }

  const resultHTML = `<div class="result-card">
    <div class="result-header">
      <div class="result-total">${fmt(grandTotal)}</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:6px">${t.label} · ${CITIES.find(c=>c.id===currentCity).label} · ${area.toLocaleString()} ${isBuilding?"sq ft":unit.replace("/","")}${pi.storeys > 0 && isBuilding ? " · " + pi.storeys + " storeys" : ""}</div>
    </div>
    <div class="result-body">
      <div class="result-row"><div><div class="lbl">Building Hard Cost</div><div class="sub">${area.toLocaleString()} ${isBuilding?"sf":unit.replace("/","")} × $${rate.toLocaleString()}${unit}</div></div><div class="val">${fmt(baseCost)}</div></div>
      ${parkRow}
      <div class="result-divider"></div>
      <div class="result-row"><div class="lbl" style="color:var(--text-dim)">Hard Cost Subtotal</div><div class="val val-dim">${fmt(hardTotal)}</div></div>
      <div class="result-row"><div><div class="lbl">Soft Cost Allowance</div><div class="sub">${softPct}% of hard costs</div></div><div class="val">${fmt(softCost)}</div></div>
      ${perUnitRow}
      ${fsrRow}
    </div>
    <div class="result-footer"><p>Building, parking, and road/servicing rates sourced directly from the 2025 Altus Group Canadian Cost Guide. Bridge, watermain, and sewer rates are industry benchmark estimates. Hard costs use CIQS floor area definition — do not apply to zoning GFA without grossing up (typically 8–18%). Excludes GST/HST/QST, tariff impacts, land, site servicing, and soft costs unless added above. For initial budgeting only — consult a qualified cost professional for project-specific estimates.</p></div>
  </div>
  ${compHTML}
  <button class="link-btn link-btn-orange" onclick="switchTab('lcca')">Run Life-Cycle Cost Analysis →</button>
  <button class="link-btn" onclick="switchTab('optimize')">Explore Building Optimization →</button>`;
  document.getElementById("resultArea").innerHTML = resultHTML;
  document.getElementById("resultArea").scrollIntoView({behavior:"smooth"});
}

  html += `<div class="est-section"><div class="est-label">Maintenance Level</div>
    <div class="pill-group">${["low","standard","high"].map(m=>`<button class="lcca-pill ${lccaMaintTier===m?'active':''}" onclick="lccaMaintTier='${m}';renderLCCA()">${m[0].toUpperCase()+m.slice(1)}</button>`).join("")}</div></div>`;
  html += `<div class="est-section">

    <input type="range" min="1" max="8" step="0.5" value="${lccaDiscount}" oninput="lccaDiscount=+this.value;renderLCCA()">
  </div>`;
  html += `<div class="est-section">
    <div class="slider-row"><span class="est-label">Energy Escalation</span><span class="slider-val">${lccaEnergyEsc}%/yr</span></div>

function generateLCCA() {
  const e = lastEstimate;
  const cat = e.type.cat;
  const eui = ENERGY.eui[cat] || 16.5;
  const elecR = ENERGY.elecRate[e.city];
  const gasR = ENERGY.gasRate[e.city];
  const elecShare = ENERGY.elecShare[cat] || 0.5;
  const annualEnergy = e.area * eui * (elecShare * elecR + (1 - elecShare) * gasR);
  const annualMaint = e.hardTotal * MAINT[lccaMaintTier];
  const dr = lccaDiscount / 100;
  const ee = lccaEnergyEsc / 100;
  const me = lccaMaintEsc / 100;
  let pvEnergy = 0, pvMaint = 0, pvReplace = 0;
  const yearlyData = [];
  let cumConst = e.grandTotal, cumEnergy = 0, cumMaint = 0, cumReplace = 0;
  const replacementEvents = [];
  for (let yr = 1; yr <= lccaPeriod; yr++) {
    const eCost = annualEnergy * Math.pow(1 + ee, yr - 1);
    const mCost = annualMaint * Math.pow(1 + me, yr - 1);
    const pvFactor = 1 / Math.pow(1 + dr, yr);
    pvEnergy += eCost * pvFactor;
    pvMaint += mCost * pvFactor;
    let yrReplace = 0;
    REPLACEMENTS.forEach(comp => {
      if (yr > 0 && yr % comp.cycle === 0 && cat !== "parking" && cat !== "infrastructure") {
        const rCost = e.hardTotal * comp.pct * Math.pow(1 + me, yr - 1);
        yrReplace += rCost;
        pvReplace += rCost * pvFactor;
        replacementEvents.push({year: yr, name: comp.name, cost: rCost});
      }
    });
    cumEnergy += eCost; cumMaint += mCost; cumReplace += yrReplace;
    yearlyData.push({yr, cumTotal: cumConst + cumEnergy + cumMaint + cumReplace, cumEnergy, cumMaint, cumReplace});
  }
  const pvTotal = e.grandTotal + pvEnergy + pvMaint + pvReplace;
  const costPerSf = pvTotal / e.area;
  const opRatio = (pvEnergy + pvMaint + pvReplace) / e.grandTotal;
  // Bar chart — sample every 5 years
  const sampleYears = yearlyData.filter(d => d.yr % 5 === 0 || d.yr === lccaPeriod);
  const maxCum = sampleYears[sampleYears.length - 1].cumTotal;
  const barColors = {const:"#4fd1c5",energy:"#f6ad55",maint:"#b794f4",replace:"#fc8181"};
  let resultHTML = `<div class="result-card">
    <div class="result-header">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">Total Life-Cycle Cost (${lccaPeriod}yr, Present Value)</div>
      <div class="result-total">${fmtM(pvTotal)}</div>
    </div>
    <div style="padding:16px 20px">
      <div class="opt-grid">
        <div class="lcca-metric"><div class="m-label">Construction</div><div class="m-val" style="color:var(--accent)">${fmtM(e.grandTotal)}</div><div class="m-sub">${((e.grandTotal/pvTotal)*100).toFixed(0)}% of total</div></div>
        <div class="lcca-metric"><div class="m-label">Energy (PV)</div><div class="m-val" style="color:var(--orange)">${fmtM(pvEnergy)}</div><div class="m-sub">Year 1: ${fmt(annualEnergy)}/yr</div></div>
        <div class="lcca-metric"><div class="m-label">Maintenance (PV)</div><div class="m-val" style="color:var(--purple)">${fmtM(pvMaint)}</div><div class="m-sub">${lccaMaintTier} tier</div></div>
        <div class="lcca-metric"><div class="m-label">Replacements (PV)</div><div class="m-val" style="color:var(--red)">${fmtM(pvReplace)}</div><div class="m-sub">${replacementEvents.length} events</div></div>
      </div>
      <div style="margin-top:16px;padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:var(--text-faint)">Operating:Construction Ratio</span><span style="font-family:var(--mono);font-size:13px;font-weight:600">${opRatio.toFixed(1)}x</span></div>
        <div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--text-faint)">Total Cost/SF (PV)</span><span style="font-family:var(--mono);font-size:13px;font-weight:600">$${costPerSf.toFixed(0)}</span></div>
      </div>
    </div>
    <div style="padding:0 20px 16px">
      <div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px">Cumulative Cost Buildup</div>
      <div class="bar-chart">
        ${sampleYears.map(d => {
          const constW = (e.grandTotal / maxCum * 100).toFixed(1);
          const eW = (d.cumEnergy / maxCum * 100).toFixed(1);
          const mW = (d.cumMaint / maxCum * 100).toFixed(1);
          const rW = (d.cumReplace / maxCum * 100).toFixed(1);
          return `<div class="bar-row-lc"><div style="font-size:11px;color:var(--text-dim);font-family:var(--mono)">Yr ${d.yr}</div>
            <div class="bar-track-lc"><div class="bar-seg" style="width:${constW}%;background:${barColors.const}"></div><div class="bar-seg" style="width:${eW}%;background:${barColors.energy}"></div><div class="bar-seg" style="width:${mW}%;background:${barColors.maint}"></div><div class="bar-seg" style="width:${rW}%;background:${barColors.replace}"></div></div>
            <div style="font-size:10px;color:var(--text-dim);font-family:var(--mono);text-align:right">${fmtM(d.cumTotal)}</div></div>`;
        }).join("")}
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:${barColors.const}"></div>Construction</div>
        <div class="legend-item"><div class="legend-dot" style="background:${barColors.energy}"></div>Energy</div>
        <div class="legend-item"><div class="legend-dot" style="background:${barColors.maint}"></div>Maintenance</div>
        <div class="legend-item"><div class="legend-dot" style="background:${barColors.replace}"></div>Replacements</div>
      </div>
    </div>
    ${replacementEvents.length ? `<div style="padding:0 20px 16px"><div style="font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px">Replacement Schedule</div>
      ${replacementEvents.slice(0,12).map(ev => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #141c30;font-size:12px">
        <div><span style="color:var(--text-dim);font-family:var(--mono)">Year ${ev.year}</span> <span style="margin-left:8px">${ev.name}</span></div>
        <div style="font-family:var(--mono);color:var(--red)">${fmt(ev.cost)}</div></div>`).join("")}
      ${replacementEvents.length > 12 ? `<div style="font-size:11px;color:var(--text-faint);margin-top:8px">+ ${replacementEvents.length-12} more events</div>` : ""}
    </div>` : ""}
    <div class="result-footer"><p>Energy benchmarks from NRCan SCIEU 2019. Provincial rates are approximate commercial blended averages. Energy escalation ${lccaEnergyEsc}%/yr, maintenance ${lccaMaintEsc}%/yr, discount rate ${lccaDiscount}%. Component cycles are industry standard estimates. For planning purposes only.</p></div>
  </div>`;
  document.getElementById("lccaResult").innerHTML = resultHTML;
  document.getElementById("lccaResult").scrollIntoView({behavior:"smooth"});
  showLCCA = true;
}

// ── Structural Threshold Analyzer ──
function renderThreshold() {
  const city = lastEstimate?.city || currentCity;
  const area = lastEstimate?.area || sqft;
  const q = lastEstimate?.quality || quality;
  const tiers = [
    {label:"Up to 12 Storeys",id:"condo_12",system:"Wood Frame / Concrete (≤6), Post-Tension (7–12)",floors:"1–12",note:"Most economical structural system. Wood frame dominates up to 6 storeys; post-tension concrete above."},
    {label:"13–39 Storeys",id:"condo_13_39",system:"Reinforced Concrete / Shear Wall",floors:"13–39",note:"Major cost jump at 13 storeys. Requires concrete shear walls, deeper foundations, and extended crane time."},
    {label:"40–60 Storeys",id:"condo_40_60",system:"High-Strength Concrete / Outrigger",floors:"40–60",note:"Premium engineering: high-strength concrete mix, outrigger systems, wind tunnel testing typically required."},
    {label:"60+ Storeys",id:"condo_60plus",system:"High-Strength Concrete / Steel Hybrid",floors:"60+",note:"Available only in Toronto and Vancouver markets per Altus. Damping systems, specialized formwork, extended schedule."}
  ];
  const tierData = tiers.map(t => {
    const type = TYPES.find(x => x.id === t.id);
    const rate = lerp(type.rates[city][0], type.rates[city][1], q);
    const totalCost = rate * area;
    return {...t, rate, totalCost};
  });
  const baseRate = tierData[0].rate;
  const maxRate = tierData[tierData.length-1].rate;
  let html = `<div style="font-size:15px;font-weight:600;margin-bottom:4px">Structural Threshold Analyzer</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px">${CITIES.find(c=>c.id===city).label} · ${area.toLocaleString()} sf · ${q}% quality</div>`;
  html += `<div class="opt-result" style="margin-top:0">`;
  tierData.forEach((t, i) => {
    const premium = i === 0 ? 0 : ((t.rate - baseRate) / baseRate * 100);
    const jump = i === 0 ? null : t.rate - tierData[i-1].rate;
    const jumpPct = i === 0 ? null : ((t.rate - tierData[i-1].rate) / tierData[i-1].rate * 100);
    const barW = (t.rate / maxRate * 100).toFixed(0);
    html += `<div style="padding:14px 0;${i>0?'border-top:1px solid #141c30':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:13px;font-weight:600">${t.label}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${t.system} · Floors ${t.floors}</div></div>
        <div style="text-align:right"><div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent)">$${t.rate}/sf</div>
        ${i > 0 ? `<div class="savings-tag tag-cost" style="margin-top:4px">+$${jump}/sf (+${jumpPct.toFixed(0)}%)</div>` : `<div class="savings-tag tag-neutral" style="margin-top:4px">Baseline</div>`}
        </div>
      </div>
      <div style="margin-top:8px"><div class="comp-track"><div class="comp-bar" style="width:${barW}%;background:${i===0?'var(--green)':i===1?'var(--accent)':i===2?'var(--orange)':'var(--red)'}"></div></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <div style="font-size:11px;color:var(--text-dim)">${t.note}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;margin-left:12px">${fmtM(t.totalCost)}</div>
      </div>
    </div>`;
  });
  // Summary
  const totalPremium = tierData[3].rate - tierData[0].rate;
  const biggestJump = tierData[2].rate - tierData[1].rate;
  html += `<div style="margin-top:12px;padding:12px;background:#0a0f1c;border-radius:8px;border:1px solid #1a2035">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">Key Insight</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.6">The biggest cost jump occurs at the 12-to-13 storey transition (+$${biggestJump}/sf), where the structural system shifts from post-tension concrete to reinforced concrete shear walls. For a ${area.toLocaleString()} sf building, choosing 12 storeys instead of 13 saves approximately ${fmtM(biggestJump * area)} in hard costs. The full range from low-rise to supertall is $${totalPremium}/sf (+${((totalPremium/baseRate)*100).toFixed(0)}% premium).</div>
  </div></div>`;
  return html;
}
// ── Parking Mix Optimizer ──
function renderParkingOpt() {
  const city = lastEstimate?.city || currentCity;
  const q = lastEstimate?.quality || quality;
  const stalls = lastEstimate?.parkingStalls || parkingStalls || 100;
  const scenarios = [
    {label:"100% Underground",mix:{underground:1.0,above:0,surface:0}},
    {label:"100% Above Grade",mix:{underground:0,above:1.0,surface:0}},
    {label:"50/50 UG + Above",mix:{underground:0.5,above:0.5,surface:0}},
    {label:"70 UG / 30 Surface",mix:{underground:0.7,above:0,surface:0.3}},
    {label:"50 Above / 50 Surface",mix:{underground:0,above:0.5,surface:0.5}},
    {label:"100% Surface",mix:{underground:0,above:0,surface:1.0}}
  ];
  const ugType = TYPES.find(x=>x.id==="parkade_ug");
  const agType = TYPES.find(x=>x.id==="parkade_ag");
  const sfType = TYPES.find(x=>x.id==="surface_lot");
  const ugRate = lerp(ugType.rates[city][0],ugType.rates[city][1],q);
  const agRate = lerp(agType.rates[city][0],agType.rates[city][1],q);
  const sfRate = lerp(sfType.rates[city][0],sfType.rates[city][1],q);
  const scenarioData = scenarios.map(s => {
    const cost = stalls * (s.mix.underground * ugRate + s.mix.above * agRate + s.mix.surface * sfRate);
    const perStall = cost / stalls;
    return {...s, cost, perStall};
  });
  const minCost = Math.min(...scenarioData.map(s=>s.cost));
  const maxCost = Math.max(...scenarioData.map(s=>s.cost));
  let html = `<div style="font-size:15px;font-weight:600;margin-bottom:4px">Parking Mix Optimizer</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">${CITIES.find(c=>c.id===city).label} · ${stalls} stalls · ${q}% quality</div>
    <div style="font-size:11px;color:var(--text-faint);margin-bottom:16px">UG: $${ugRate.toLocaleString()}/stall · Above: $${agRate.toLocaleString()}/stall · Surface: $${sfRate.toLocaleString()}/stall</div>`;
  html += `<div class="opt-result" style="margin-top:0">`;
  scenarioData.forEach((s, i) => {
    const savings = s.cost - minCost;
    const barW = (s.cost / maxCost * 100).toFixed(0);
    const isMin = s.cost === minCost;
    const isMax = s.cost === maxCost;
    html += `<div class="scenario-row">
      <div><div class="scenario-label">${s.label}</div>
        <div style="font-size:10px;color:var(--text-faint);margin-top:2px">$${Math.round(s.perStall).toLocaleString()}/stall avg</div></div>
      <div style="text-align:right"><div class="scenario-val" style="color:${isMin?'var(--green)':isMax?'var(--red)':'var(--text)'}">${fmtM(s.cost)}</div>
        ${isMin ? `<div class="savings-tag tag-save" style="margin-top:3px">Lowest</div>` : `<div class="savings-tag tag-cost" style="margin-top:3px">+${fmtM(savings)}</div>`}
      </div>
    </div>`;
  });
  const ugTotal = stalls * ugRate;
  const potentialSaving = ugTotal - minCost;
  html += `<div style="margin-top:12px;padding:12px;background:#0a0f1c;border-radius:8px;border:1px solid #1a2035">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">Key Insight</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.6">If your current plan is 100% underground parking, switching to a surface-only configuration saves ${fmtM(potentialSaving)} (${((potentialSaving/ugTotal)*100).toFixed(0)}% reduction). As cities reduce minimum parking requirements, optimizing the parking mix is one of the highest-impact cost levers available. Each underground stall costs ${((ugRate/sfRate)).toFixed(0)}x more than a surface stall.</div>
  </div></div>`;
  return html;
}
// ── Building Shape Efficiency ──
function renderShapeOpt() {
  const city = lastEstimate?.city || currentCity;
  const area = lastEstimate?.area || sqft;
  const rate = lastEstimate?.rate || 300;
  // Shape efficiency modifiers based on perimeter-to-area ratios
  // Square is baseline (1.0), other shapes have higher wall ratios
  const shapes = [
    {id:"square",label:"Square",ratio:1.0,perimFactor:1.0,desc:"Most efficient. Minimum perimeter for given area.",example:"40m × 40m"},
    {id:"rect_2_1",label:"Rectangle (2:1)",ratio:1.06,perimFactor:1.06,desc:"Slight premium. Common for site constraints.",example:"56m × 28m"},
    {id:"rect_3_1",label:"Rectangle (3:1)",ratio:1.15,perimFactor:1.15,desc:"Noticeable wall cost increase. Narrow sites.",example:"69m × 23m"},
    {id:"lshape",label:"L-Shape",ratio:1.18,perimFactor:1.18,desc:"More exterior wall. Common for corner sites, courtyard layouts.",example:"Two wings"},
    {id:"ushape",label:"U-Shape",ratio:1.25,perimFactor:1.25,desc:"High envelope cost. Courtyard benefit for amenity space.",example:"Three wings"},
    {id:"tower",label:"Tower (Point Tower)",ratio:1.12,perimFactor:1.12,desc:"Compact but all-exterior. Higher wind loads at height.",example:"25m × 25m core"}
  ];
  // Wall/envelope typically 15-20% of construction cost
  const envelopePct = 0.17;
  const baseCost = rate * area;
  const shapeData = shapes.map(s => {
    const envelopePremium = baseCost * envelopePct * (s.perimFactor - 1);
    const totalCost = baseCost + envelopePremium;
    const effectiveRate = totalCost / area;
    return {...s, envelopePremium, totalCost, effectiveRate};
  });
  let html = `<div style="font-size:15px;font-weight:600;margin-bottom:4px">Building Shape Efficiency</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px">${CITIES.find(c=>c.id===city).label} · ${area.toLocaleString()} sf at $${rate}/sf · Envelope at ~17% of construction</div>`;
  html += `<div class="opt-result" style="margin-top:0">`;
  shapeData.forEach((s, i) => {
    const premPct = ((s.ratio - 1) * 100).toFixed(1);
    const barW = Math.min(100, (s.ratio / 1.30 * 100)).toFixed(0);
    html += `<div style="padding:12px 0;${i>0?'border-top:1px solid #141c30':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:13px;font-weight:600">${s.label}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${s.desc}</div></div>
        <div style="text-align:right;white-space:nowrap;margin-left:12px">
          <div style="font-family:var(--mono);font-size:14px;font-weight:600">$${Math.round(s.effectiveRate)}/sf</div>
          ${s.envelopePremium > 0 ? `<div class="savings-tag tag-cost" style="margin-top:3px">+${fmtM(s.envelopePremium)}</div>` : `<div class="savings-tag tag-save" style="margin-top:3px">Baseline</div>`}
        </div>
      </div>
      <div style="margin-top:6px"><div class="comp-track" style="height:12px"><div class="comp-bar" style="width:${barW}%;background:${s.ratio<=1.0?'var(--green)':s.ratio<=1.10?'var(--accent)':s.ratio<=1.18?'var(--orange)':'var(--red)'}"></div></div></div>
    </div>`;
  });
  const worstPremium = shapeData[4].envelopePremium; // U-shape
  html += `<div style="margin-top:12px;padding:12px;background:#0a0f1c;border-radius:8px;border:1px solid #1a2035">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">Key Insight</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.6">Building shape affects cost primarily through the envelope (exterior wall and glazing), which typically represents 15-20% of construction cost. A U-shaped building costs approximately ${fmtM(worstPremium)} more than a square footprint of the same area due to the additional exterior wall. For projects where site constraints force an irregular shape, budget an extra ${((shapeData[3].ratio-1)*100).toFixed(0)}-${((shapeData[4].ratio-1)*100).toFixed(0)}% for envelope premiums.</div>
  </div></div>`;
  return html;
}
// ── CIQS vs Zoning Floor Area ──
function renderAreaOpt() {
  const area = lastEstimate?.area || sqft;
  let ciqsSf = area;
  let html = `<div style="font-size:15px;font-weight:600;margin-bottom:4px">CIQS vs. Zoning Floor Area</div>
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px">Calculate the grossing-up factor between measured construction area (CIQS) and zoning GFA</div>`;
  html += `<div class="opt-result" style="margin-top:0">
    <div class="est-section" style="margin-bottom:16px">
      <div class="est-label">CIQS Measured Floor Area (sq ft)</div>
      <input type="number" class="opt-input" id="ciqsInput" value="${ciqsSf}" min="1000" step="1000" oninput="updateAreaCalc()" inputmode="numeric">
      <div style="font-size:10px;color:var(--text-faint);margin-top:4px">Total floor area per CIQS standards (includes all enclosed area measured to exterior face of walls)</div>
    </div>`;
  // Common grossing-up factors
  const factors = [
    {label:"Residential Condo",factor:1.15,note:"Balconies, mechanical penthouses, amenity counted differently"},
    {label:"Office",factor:1.10,note:"Mechanical floors, loading docks may be excluded from zoning GFA"},
    {label:"Mixed-Use",factor:1.18,note:"Multiple uses trigger different zoning calculations"},
    {label:"Retail / Commercial",factor:1.08,note:"Storage, receiving areas may be excluded"},
  ];
  html += `<div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text-dim)">Common Grossing-Up Factors</div>`;
  factors.forEach(f => {
    const zoningGFA = Math.round(ciqsSf / f.factor);
    const diff = ciqsSf - zoningGFA;
    html += `<div style="padding:10px 0;border-bottom:1px solid #141c30">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:13px;font-weight:500">${f.label}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${f.note}</div></div>
        <div style="text-align:right;white-space:nowrap;margin-left:12px">
          <div style="font-family:var(--mono);font-size:13px;font-weight:600">${f.factor.toFixed(2)}x</div>
          <div style="font-size:10px;color:var(--text-faint)">Zoning: ${zoningGFA.toLocaleString()} sf</div>
        </div>
      </div>
    </div>`;
  });
  html += `<div style="margin-top:16px">
    <div class="est-label">Custom Grossing-Up Factor</div>
    <div style="display:flex;gap:10px;align-items:center;margin-top:6px">
      <input type="number" class="opt-input" id="customFactor" value="1.15" min="1.0" max="1.5" step="0.01" oninput="updateAreaCalc()" style="max-width:120px">
      <div style="font-size:12px;color:var(--text-dim)">→ Zoning GFA: <span id="customZoning" style="font-family:var(--mono);color:var(--accent);font-weight:600">${Math.round(ciqsSf/1.15).toLocaleString()}</span> sf</div>
    </div>
  </div>`;
  html += `<div style="margin-top:16px;padding:12px;background:#0a0f1c;border-radius:8px;border:1px solid #1a2035">
    <div style="font-size:12px;font-weight:600;margin-bottom:8px">Why This Matters</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.6">Cost estimating uses CIQS floor area (measured to exterior face of walls, includes all enclosed space). Zoning uses GFA which excludes certain areas depending on the municipality. When a developer says "we have 50,000 sf of GFA approved," the actual construction area they need to budget for is typically 8-18% larger. Getting this conversion wrong means underestimating construction cost from the very first feasibility calculation.</div>
  </div></div>`;
  return html;
}
function updateAreaCalc() {
  const ciqsInput = document.getElementById("ciqsInput");
  const factorInput = document.getElementById("customFactor");
  const zoningSpan = document.getElementById("customZoning");
  if (ciqsInput && factorInput && zoningSpan) {
    const ciqsVal = parseFloat(ciqsInput.value) || 50000;
    const factorVal = parseFloat(factorInput.value) || 1.15;
    zoningSpan.textContent = Math.round(ciqsVal / factorVal).toLocaleString();
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("browsePanel").classList.toggle("hidden", tab !== "browse");
  document.getElementById("estimatePanel").classList.toggle("hidden", tab !== "estimate");
  document.getElementById("lccaPanel").classList.toggle("hidden", tab !== "lcca");
  document.getElementById("optimizePanel").classList.toggle("hidden", tab !== "optimize");
  if (tab === "estimate") renderEstimate();
  if (tab === "lcca") renderLCCA();
  if (tab === "optimize") renderOptimize();
}
