<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Construction Cost Estimator — 2026 Altus Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="shell">
  <div class="hdr">
    <div class="hdr-mark">
      <div class="hdr-dot"></div>
      <div>
        <div class="hdr-title">ZEF Estimator <span>/ Canada</span></div>
        <div class="hdr-sub">2026 Altus Cost Guide</div>
      </div>
    </div>
  </div>

  <div class="scenario-bar" id="scenarioBar"></div>
  <div class="city-bar" id="cityBar"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="browse"   onclick="switchTab('browse')">Browse</button>
    <button class="tab-btn"        data-tab="estimate" onclick="switchTab('estimate')">Estimate<span class="tab-badge"></span></button>
    <button class="tab-btn"        data-tab="lcca"     onclick="switchTab('lcca')">Life-Cycle<span class="tab-badge"></span></button>
    <button class="tab-btn"        data-tab="optimize" onclick="switchTab('optimize')">Optimize<span class="tab-badge"></span></button>
    <button class="tab-btn"        data-tab="compare"  onclick="switchTab('compare')" id="compareTab">Compare</button>
    <button class="tab-btn"        data-tab="sustain"  onclick="switchTab('sustain')">Sustain<span class="tab-badge"></span></button>
    <button class="tab-btn"        data-tab="report"   onclick="switchTab('report')">Report</button>
  </div>

  <div id="browsePanel"   class="fade-in"></div>
  <div id="estimatePanel" class="hidden fade-in"></div>
  <div id="lccaPanel"     class="hidden fade-in"></div>
  <div id="optimizePanel" class="hidden fade-in"></div>
  <div id="comparePanel"  class="hidden fade-in"></div>
  <div id="sustainPanel"  class="hidden fade-in"></div>
  <div id="reportPanel"   class="hidden fade-in"></div>
</div>

<!-- Data -->
<script src="data/building-types.js"></script>
<script src="data/defaults.js"></script>
<script src="data/energy.js"></script>
<script src="data/parking.js"></script>
<script src="data/sustainability.js"></script>

<!-- Core -->
<script src="core/state.js"></script>
<script src="core/compute.js"></script>
<script src="core/ui.js"></script>

<!-- Tabs -->
<script src="tabs/browse.js"></script>
<script src="tabs/estimate.js"></script>
<script src="tabs/lcca.js"></script>
<script src="tabs/optimize.js"></script>
<script src="tabs/compare.js"></script>
<script src="tabs/sustain.js"></script>
<script src="tabs/notes-photos.js"></script>
<script src="tabs/report.js"></script>

<!-- Init -->
<script>
  const restored = loadState();
  if (restored) { showToast("Session restored"); }
  refreshAll();
</script>

</body>
</html>
