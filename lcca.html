<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life-Cycle Cost Analysis — Canadian Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c18; --text: #e0e3eb; --text-dim: rgba(224,227,235,0.4); --text-faint: rgba(224,227,235,0.22);
  --accent: #4fd1c5; --accent2: #f6ad55; --blue: #2b6cb0; --red: #fc8181;
  --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:rgba(79,209,197,0.25)}
input::placeholder{color:var(--text-faint)}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:22px;width:22px;border-radius:50%;background:var(--accent);margin-top:-8px;box-shadow:0 0 12px rgba(79,209,197,0.25)}
input[type=range]::-moz-range-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px}
input[type=range]::-moz-range-thumb{height:22px;width:22px;border-radius:50%;background:var(--accent);border:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.35s ease forwards}
.slide-up{animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards}
.container{max-width:960px;margin:0 auto;padding:0 28px}
.header{border-bottom:1px solid rgba(255,255,255,0.07);padding:22px 0;background:linear-gradient(180deg,rgba(246,173,85,0.04) 0%,transparent 100%)}
.header-inner{display:flex;align-items:center;gap:14}
.logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--accent2),#dd6b20);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--bg);font-family:var(--mono);flex-shrink:0}
.header h1{font-size:19px;font-weight:700;letter-spacing:-0.025em;color:#fff}
.header p{font-size:11.5px;color:var(--text-dim);margin-top:1px}
.lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:var(--text-faint);margin-bottom:10px}
.panel{padding:20px 22px;border-radius:14px;background:#0e1324;border:1px solid #1e2538;margin-bottom:16px}
.panel-accent{background:linear-gradient(135deg,rgba(246,173,85,0.05),rgba(79,209,197,0.03));border-color:rgba(246,173,85,0.15)}
.pill{padding:8px 16px;border-radius:9px;border:1px solid #1e2538;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;background:#121828;color:#8a8fa0;transition:all 0.2s;-webkit-appearance:none}
.pill.active{background:linear-gradient(135deg,var(--accent2),#dd6b20);color:#080c18;border-color:var(--accent2);font-weight:600;box-shadow:0 2px 14px rgba(246,173,85,0.2)}
.pill-teal.active{background:linear-gradient(135deg,var(--accent),#38a89d);border-color:var(--accent);box-shadow:0 2px 14px rgba(79,209,197,0.2)}
select{padding:10px 14px;border-radius:8px;border:1px solid #1e2538;background:#121828;color:#e0e3eb;font-family:var(--sans);font-size:13px;outline:none;-webkit-appearance:none;width:100%;cursor:pointer}
.num-input{width:100%;padding:10px 0;border:none;border-bottom:2px solid rgba(255,255,255,0.1);background:transparent;color:#fff;font-size:24px;font-family:var(--mono);font-weight:600;outline:none;-webkit-appearance:none}
.num-input:focus{border-color:var(--accent2)}
.gen-btn{width:100%;padding:17px;border-radius:13px;border:none;font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:-0.01em;cursor:pointer;transition:all 0.3s}
.gen-btn.ready{background:linear-gradient(135deg,var(--accent2),#dd6b20);color:#080c18;box-shadow:0 4px 28px rgba(246,173,85,0.25)}
.gen-btn.ready:hover{box-shadow:0 6px 36px rgba(246,173,85,0.35);transform:translateY(-1px)}
.gen-btn.disabled{background:rgba(255,255,255,0.05);color:var(--text-faint);cursor:not-allowed}
.result-card{border-radius:16px;overflow:hidden;background:linear-gradient(180deg,rgba(246,173,85,0.04),rgba(79,209,197,0.02));box-shadow:0 0 0 1px rgba(246,173,85,0.2),0 4px 30px rgba(246,173,85,0.06)}
.result-header{padding:30px 24px 22px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07)}
.result-body{padding:22px 24px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.row .v{font-size:18px;font-family:var(--mono);font-weight:600;color:var(--text)}
.row .v-dim{color:rgba(224,227,235,0.55);font-weight:500;font-size:16px}
.divider{height:1px;background:rgba(255,255,255,0.07);margin:6px 0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}}
.bar-chart{display:flex;flex-direction:column;gap:4px;margin-top:12px}
.bar-row{display:grid;grid-template-columns:60px 1fr 80px;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--text-dim)}
.bar-track{height:20px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;position:relative;display:flex}
.bar-seg{height:100%;transition:width 0.5s ease}
.bar-val{font-size:11px;font-family:var(--mono);color:var(--text-dim);text-align:right}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.footer-note{padding:14px 24px;background:rgba(255,255,255,0.015);border-top:1px solid rgba(255,255,255,0.04)}
.footer-note p{font-size:10px;color:var(--text-faint);line-height:1.6}
.back-link{display:inline-block;margin-bottom:20px;font-size:13px;color:var(--accent);text-decoration:none;opacity:0.7}
.back-link:hover{opacity:1}
.hidden{display:none}
.tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:4px;background:#141c30;color:#6b7080;margin:2px 3px 2px 0}
</style>
</head>
<body>
<div class="header">
  <div class="container">
    <div class="header-inner">
      <div class="logo">L</div>
      <div>
        <h1>Life-Cycle Cost Analysis</h1>
        <p>25-50 Year Total Cost of Ownership · Canadian Construction</p>
      </div>
    </div>
  </div>
</div>
<div class="container" style="padding-top:16px;padding-bottom:80px">
  <a href="index.html" class="back-link">&larr; Back to Estimator</a>
  <div id="app"></div>
</div>

<script>
// ════════════════════════════════════════════════
// DATA: Energy rates, EUI benchmarks, maintenance
// ════════════════════════════════════════════════

// Commercial electricity rates (¢/kWh) by city - blended average for commercial buildings
// Sources: CER, NRCan, provincial utility data 2025
const ELEC_RATES = {
  Vancouver: 12.5, Calgary: 17.0, Edmonton: 17.0, Winnipeg: 9.5,
  GTA: 15.8, Ottawa: 15.8, Montreal: 8.5, Halifax: 17.5, "St. John's": 14.0
};

// Natural gas rates ($/GJ) by city
const GAS_RATES = {
  Vancouver: 12.0, Calgary: 6.5, Edmonton: 6.5, Winnipeg: 7.0,
  GTA: 10.5, Ottawa: 10.5, Montreal: 11.0, Halifax: 15.0, "St. John's": 18.0
};

// Site Energy Use Intensity (GJ/m²/year) by building category
// Source: NRCan ENERGY STAR Portfolio Manager Canadian National Median Table (Aug 2023)
// Based on SCIEU 2019 and SECMURBs 2018
const EUI_DATA = {
  condo_apartment:    { eui: 0.82, label: "Condos / Apartments", elecShare: 0.55, category: "residential" },
  townhouse:          { eui: 0.82, label: "Townhouse / Low-Rise Res.", elecShare: 0.50, category: "residential" },
  single_family:      { eui: 0.82, label: "Single Family", elecShare: 0.45, category: "residential" },
  seniors_housing:    { eui: 1.21, label: "Seniors Housing", elecShare: 0.50, category: "residential" },
  office:             { eui: 0.87, label: "Office Building", elecShare: 0.60, category: "commercial" },
  retail:             { eui: 0.85, label: "Retail", elecShare: 0.65, category: "commercial" },
  supermarket:        { eui: 1.07, label: "Supermarket / Grocery", elecShare: 0.70, category: "commercial" },
  hotel:              { eui: 0.87, label: "Hotel", elecShare: 0.50, category: "commercial" },
  warehouse:          { eui: 0.72, label: "Warehouse / Distribution", elecShare: 0.55, category: "commercial" },
  school:             { eui: 0.70, label: "K-12 School", elecShare: 0.50, category: "institutional" },
  university:         { eui: 1.04, label: "University / College", elecShare: 0.55, category: "institutional" },
  hospital:           { eui: 2.20, label: "Hospital / Acute Care", elecShare: 0.55, category: "institutional" },
  medical_clinic:     { eui: 0.74, label: "Medical Clinic", elecShare: 0.60, category: "institutional" },
  library:            { eui: 1.03, label: "Library", elecShare: 0.55, category: "institutional" },
  fire_station:       { eui: 0.66, label: "Fire / EMS Station", elecShare: 0.50, category: "civic" },
  ice_arena:          { eui: 1.10, label: "Ice Arena", elecShare: 0.65, category: "civic" },
  recreation:         { eui: 0.68, label: "Recreation Centre", elecShare: 0.55, category: "civic" },
  museum:             { eui: 0.41, label: "Museum / Gallery", elecShare: 0.60, category: "civic" }
};

// Maintenance cost as % of construction cost per year, by building category
const MAINT_RATES = {
  residential: { low: 0.015, mid: 0.020, high: 0.030 },
  commercial:  { low: 0.015, mid: 0.025, high: 0.035 },
  institutional:{ low: 0.020, mid: 0.030, high: 0.040 },
  civic:       { low: 0.020, mid: 0.030, high: 0.040 }
};

// Major component replacement cycles and cost as % of initial construction cost
const REPLACEMENTS = [
  { name: "Roofing System", year: 22, costPct: 0.04, icon: "▲" },
  { name: "HVAC / Mechanical", year: 18, costPct: 0.12, icon: "◆" },
  { name: "Building Envelope (Reseal)", year: 12, costPct: 0.03, icon: "■" },
  { name: "Elevator Systems", year: 28, costPct: 0.05, icon: "▸" },
  { name: "Plumbing Systems", year: 35, costPct: 0.06, icon: "●" },
  { name: "Electrical Systems", year: 35, costPct: 0.05, icon: "◇" },
  { name: "Interior Fitout Refresh", year: 15, costPct: 0.08, icon: "□" },
  { name: "Flooring Replacement", year: 12, costPct: 0.02, icon: "═" }
];

const CITIES = ["GTA","Vancouver","Calgary","Edmonton","Winnipeg","Ottawa","Montreal","Halifax","St. John's"];
const HORIZONS = [25, 30, 40, 50];

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let state = {
  city: "GTA",
  buildingType: "condo_apartment",
  sqft: "",
  constructionCostSf: "",
  horizon: 30,
  discountRate: 3.0,
  energyEscalation: 2.5,
  maintEscalation: 2.0,
  maintLevel: "mid",
  showResults: false
};

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function fmt(n) {
  if (n >= 1000000) return "$" + (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return "$" + Math.round(n).toLocaleString();
  return "$" + n.toFixed(0);
}

function pv(amount, rate, year) {
  return amount / Math.pow(1 + rate/100, year);
}

function sqftToSqm(sf) { return sf * 0.092903; }

function gjToKwh(gj) { return gj * 277.778; }

// ════════════════════════════════════════════════
// CALCULATION ENGINE
// ════════════════════════════════════════════════
function runLCCA() {
  const area = parseFloat(state.sqft);
  const costSf = parseFloat(state.constructionCostSf);
  if (isNaN(area) || isNaN(costSf) || area <= 0 || costSf <= 0) return null;

  const bt = EUI_DATA[state.buildingType];
  const cat = bt.category;
  const horizon = state.horizon;
  const dr = state.discountRate;

  // Initial construction cost
  const constructionCost = area * costSf;

  // Energy cost calculation
  const areaSqm = sqftToSqm(area);
  const totalEnergyGJ = areaSqm * bt.eui; // GJ/year
  const elecGJ = totalEnergyGJ * bt.elecShare;
  const gasGJ = totalEnergyGJ * (1 - bt.elecShare);
  const elecKwh = gjToKwh(elecGJ);
  const elecRate = ELEC_RATES[state.city] / 100; // $/kWh
  const gasRate = GAS_RATES[state.city]; // $/GJ

  const yearlyEnergy = [];
  const yearlyMaint = [];
  const yearlyReplacements = [];
  let totalEnergyPV = 0;
  let totalMaintPV = 0;
  let totalReplacePV = 0;

  const maintRate = MAINT_RATES[cat][state.maintLevel];

  for (let y = 1; y <= horizon; y++) {
    // Energy with escalation
    const esc = Math.pow(1 + state.energyEscalation/100, y - 1);
    const eCost = (elecKwh * elecRate + gasGJ * gasRate) * esc;
    const ePV = pv(eCost, dr, y);
    yearlyEnergy.push({ year: y, nominal: eCost, pv: ePV });
    totalEnergyPV += ePV;

    // Maintenance with escalation
    const mEsc = Math.pow(1 + state.maintEscalation/100, y - 1);
    const mCost = constructionCost * maintRate * mEsc;
    const mPV = pv(mCost, dr, y);
    yearlyMaint.push({ year: y, nominal: mCost, pv: mPV });
    totalMaintPV += mPV;

    // Replacements
    let rCost = 0;
    const rItems = [];
    REPLACEMENTS.forEach(r => {
      if (y > 0 && y % r.year === 0 && y < horizon) {
        const cost = constructionCost * r.costPct * Math.pow(1 + state.maintEscalation/100, y - 1);
        rCost += cost;
        rItems.push({ name: r.name, cost: cost });
      }
    });
    const rPV = pv(rCost, dr, y);
    yearlyReplacements.push({ year: y, nominal: rCost, pv: rPV, items: rItems });
    totalReplacePV += rPV;
  }

  const totalLCC = constructionCost + totalEnergyPV + totalMaintPV + totalReplacePV;

  // Year 1 energy cost
  const year1Energy = elecKwh * elecRate + gasGJ * gasRate;
  const energyCostSf = year1Energy / area;

  return {
    constructionCost,
    totalEnergyPV,
    totalMaintPV,
    totalReplacePV,
    totalLCC,
    year1Energy,
    energyCostSf,
    yearlyEnergy,
    yearlyMaint,
    yearlyReplacements,
    horizon,
    area,
    costSf,
    bt,
    cat,
    maintRate
  };
}

// ════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  const bt = EUI_DATA[state.buildingType];
  const cats = {};
  Object.entries(EUI_DATA).forEach(([k,v]) => {
    if (!cats[v.category]) cats[v.category] = [];
    cats[v.category].push({ key: k, ...v });
  });
  const catLabels = { residential: "Residential", commercial: "Commercial", institutional: "Institutional", civic: "Civic" };

  let html = `
  <!-- City -->
  <div class="panel">
    <div class="lbl">Market</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${CITIES.map(c => `<button class="pill ${c===state.city?'pill-teal active':''}" onclick="setState('city','${c}')">${c}</button>`).join("")}
    </div>
    <div style="margin-top:12px;display:flex;gap:20px">
      <div style="font-size:12px;color:var(--text-dim)">Electricity: <span style="color:var(--accent);font-family:var(--mono)">${ELEC_RATES[state.city]}¢/kWh</span></div>
      <div style="font-size:12px;color:var(--text-dim)">Natural Gas: <span style="color:var(--accent);font-family:var(--mono)">$${GAS_RATES[state.city]}/GJ</span></div>
    </div>
  </div>

  <!-- Building Type -->
  <div class="panel">
    <div class="lbl">Building Type</div>
    <select onchange="setState('buildingType',this.value)">
      ${Object.entries(catLabels).map(([ck,cl]) =>
        `<optgroup label="${cl}">${(cats[ck]||[]).map(t =>
          `<option value="${t.key}" ${t.key===state.buildingType?'selected':''}>${t.label}</option>`
        ).join("")}</optgroup>`
      ).join("")}
    </select>
    <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">
      <span class="tag">EUI: ${bt.eui} GJ/m²/yr</span>
      <span class="tag">Elec share: ${Math.round(bt.elecShare*100)}%</span>
      <span class="tag">Source: NRCan SCIEU 2019</span>
    </div>
  </div>

  <!-- Inputs -->
  <div class="grid-2">
    <div class="panel">
      <div class="lbl">Building Area (sq ft)</div>
      <input type="number" class="num-input" placeholder="e.g. 50000" value="${state.sqft}" oninput="setState('sqft',this.value)">
    </div>
    <div class="panel">
      <div class="lbl">Construction Cost ($/sf)</div>
      <input type="number" class="num-input" placeholder="from estimator" value="${state.constructionCostSf}" oninput="setState('constructionCostSf',this.value)">
      <div style="font-size:11px;color:var(--text-faint);margin-top:4px">Use the rate from the estimator tool</div>
    </div>
  </div>

  <!-- Analysis Period -->
  <div class="panel">
    <div class="lbl">Analysis Period</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${HORIZONS.map(h => `<button class="pill ${h===state.horizon?'active':''}" onclick="setState('horizon',${h})">${h} Years</button>`).join("")}
    </div>
  </div>

  <!-- Assumptions -->
  <div class="panel">
    <div class="lbl">Assumptions</div>
    <div class="grid-2" style="gap:20px">
      <div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">Discount Rate: <span style="color:var(--accent2);font-family:var(--mono)">${state.discountRate}%</span></div>
        <input type="range" min="1" max="6" step="0.5" value="${state.discountRate}" oninput="setState('discountRate',parseFloat(this.value))">
      </div>
      <div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">Energy Escalation: <span style="color:var(--accent2);font-family:var(--mono)">${state.energyEscalation}%/yr</span></div>
        <input type="range" min="0" max="6" step="0.5" value="${state.energyEscalation}" oninput="setState('energyEscalation',parseFloat(this.value))">
      </div>
    </div>
    <div style="margin-top:16px">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Maintenance Level</div>
      <div style="display:flex;gap:6px">
        ${["low","mid","high"].map(m => `<button class="pill ${m===state.maintLevel?'active':''}" onclick="setState('maintLevel','${m}')">${m==='low'?'Low (1.5-2%)':m==='mid'?'Standard (2-3%)':'High (3-4%)'}</button>`).join("")}
      </div>
    </div>
  </div>

  <!-- Generate -->
  <button class="gen-btn ${state.sqft && state.constructionCostSf ? 'ready' : 'disabled'}" onclick="generate()">Run Life-Cycle Analysis</button>

  <div id="results" style="margin-top:32px"></div>`;

  app.innerHTML = html;
  if (state.showResults) renderResults();
}

function renderResults() {
  const r = runLCCA();
  if (!r) return;
  const el = document.getElementById("results");

  // Percentages for breakdown
  const parts = [
    { label: "Construction", value: r.constructionCost, color: "#4fd1c5" },
    { label: "Energy", value: r.totalEnergyPV, color: "#f6ad55" },
    { label: "Maintenance", value: r.totalMaintPV, color: "#fc8181" },
    { label: "Replacements", value: r.totalReplacePV, color: "#b794f4" }
  ];
  const maxVal = r.totalLCC;

  // Build 5-year summary for chart
  const intervals = [];
  for (let y = 5; y <= r.horizon; y += 5) {
    let cumE = 0, cumM = 0, cumR = 0;
    for (let i = 0; i < y; i++) {
      cumE += r.yearlyEnergy[i].pv;
      cumM += r.yearlyMaint[i].pv;
      cumR += r.yearlyReplacements[i].pv;
    }
    intervals.push({ year: y, energy: cumE, maint: cumM, replace: cumR, total: r.constructionCost + cumE + cumM + cumR });
  }
  const chartMax = intervals.length ? intervals[intervals.length - 1].total : 1;

  // Replacement events
  const replEvents = [];
  r.yearlyReplacements.forEach(yr => {
    yr.items.forEach(item => replEvents.push({ year: yr.year, name: item.name, cost: item.cost }));
  });

  let html = `
  <div class="result-card slide-up">
    <div class="result-header">
      <div class="lbl" style="margin-bottom:8px;color:var(--text-dim)">Total Life-Cycle Cost (${r.horizon} Years, Present Value)</div>
      <div style="font-size:48px;font-weight:700;font-family:var(--mono);color:var(--accent2);letter-spacing:-0.04em;text-shadow:0 0 50px rgba(246,173,85,0.3)">
        ${fmt(r.totalLCC)}
      </div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:6px">
        ${r.bt.label} · ${state.city} · ${Number(r.area).toLocaleString()} sq ft · ${r.horizon} year horizon
      </div>
    </div>

    <div class="result-body">
      <!-- Breakdown -->
      ${parts.map(p => {
        const pct = (p.value / maxVal * 100).toFixed(1);
        return `<div class="row">
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:10px;height:10px;border-radius:3px;background:${p.color}"></div>
              <span style="font-size:14px">${p.label}</span>
            </div>
            <div style="font-size:11px;color:var(--text-faint);margin-left:18px">${pct}% of total</div>
          </div>
          <div class="v">${fmt(p.value)}</div>
        </div>`;
      }).join("")}

      <div class="divider"></div>

      <!-- Key Metrics -->
      <div style="margin-top:12px">
        <div class="lbl">Key Metrics</div>
        <div class="grid-2" style="gap:12px">
          <div style="padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035">
            <div style="font-size:11px;color:var(--text-faint)">Year 1 Energy Cost</div>
            <div style="font-size:22px;font-family:var(--mono);font-weight:600;color:var(--accent2)">${fmt(r.year1Energy)}/yr</div>
            <div style="font-size:11px;color:var(--text-faint)">${(r.energyCostSf).toFixed(2)}/sf/yr</div>
          </div>
          <div style="padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035">
            <div style="font-size:11px;color:var(--text-faint)">Annual Maintenance</div>
            <div style="font-size:22px;font-family:var(--mono);font-weight:600;color:#fc8181">${fmt(r.constructionCost * r.maintRate)}/yr</div>
            <div style="font-size:11px;color:var(--text-faint)">${(r.maintRate * 100).toFixed(1)}% of construction cost</div>
          </div>
          <div style="padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035">
            <div style="font-size:11px;color:var(--text-faint)">Operating Cost Ratio</div>
            <div style="font-size:22px;font-family:var(--mono);font-weight:600;color:#b794f4">${(((r.totalEnergyPV+r.totalMaintPV+r.totalReplacePV)/r.constructionCost)*100).toFixed(0)}%</div>
            <div style="font-size:11px;color:var(--text-faint)">of construction cost over ${r.horizon} yrs</div>
          </div>
          <div style="padding:12px;background:#0a0f1c;border-radius:10px;border:1px solid #1a2035">
            <div style="font-size:11px;color:var(--text-faint)">Total Cost per Sq Ft</div>
            <div style="font-size:22px;font-family:var(--mono);font-weight:600;color:var(--accent)">${(r.totalLCC / r.area).toFixed(0)}/sf</div>
            <div style="font-size:11px;color:var(--text-faint)">life-cycle (vs $${r.costSf}/sf build)</div>
          </div>
        </div>
      </div>

      <!-- Cumulative Cost Chart -->
      <div style="margin-top:24px">
        <div class="lbl">Cumulative Cost Over Time (Present Value)</div>
        <div class="bar-chart">
          ${intervals.map(iv => {
            const cPct = (r.constructionCost / chartMax * 100);
            const ePct = (iv.energy / chartMax * 100);
            const mPct = (iv.maint / chartMax * 100);
            const rPct = (iv.replace / chartMax * 100);
            return `<div class="bar-row">
              <span class="bar-label">Year ${iv.year}</span>
              <div class="bar-track">
                <div class="bar-seg" style="width:${cPct}%;background:#4fd1c5"></div>
                <div class="bar-seg" style="width:${ePct}%;background:#f6ad55"></div>
                <div class="bar-seg" style="width:${mPct}%;background:#fc8181"></div>
                <div class="bar-seg" style="width:${rPct}%;background:#b794f4"></div>
              </div>
              <span class="bar-val">${fmt(iv.total)}</span>
            </div>`;
          }).join("")}
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4fd1c5"></div>Construction</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f6ad55"></div>Energy</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fc8181"></div>Maintenance</div>
          <div class="legend-item"><div class="legend-dot" style="background:#b794f4"></div>Replacements</div>
        </div>
      </div>

      <!-- Replacement Events -->
      ${replEvents.length > 0 ? `
      <div style="margin-top:24px">
        <div class="lbl">Scheduled Replacement Events</div>
        ${replEvents.map(e => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
            <div>
              <span style="font-size:13px;color:var(--text)">${e.name}</span>
              <span style="font-size:11px;color:var(--text-faint);margin-left:8px">Year ${e.year}</span>
            </div>
            <span style="font-size:13px;font-family:var(--mono);color:#b794f4">${fmt(e.cost)}</span>
          </div>
        `).join("")}
      </div>` : ""}
    </div>

    <div class="footer-note">
      <p>Present values calculated using a ${state.discountRate}% real discount rate. Energy costs escalated at ${state.energyEscalation}%/yr. Maintenance escalated at ${state.maintEscalation}%/yr. Energy benchmarks from NRCan ENERGY STAR Portfolio Manager (SCIEU 2019). Electricity and gas rates are approximate commercial blended averages. Component replacement cycles are industry standard estimates. This analysis is for planning purposes only.</p>
    </div>
  </div>`;

  el.innerHTML = html;
  el.scrollIntoView({ behavior: "smooth" });
}

function setState(key, val) {
  state[key] = val;
  state.showResults = false;
  render();
}

function generate() {
  if (!state.sqft || !state.constructionCostSf) return;
  state.showResults = true;
  render();
}

// Init
render();
</script>

</body>
</html>
